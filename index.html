<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FREE FIRE BATTLEGROUNDS - FULL GAME</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #0a0f1e;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
        }

        #game-container {
            width: 100%;
            height: 100%;
            max-width: 450px;
            max-height: 900px;
            background: linear-gradient(145deg, #1a1f35, #0f1425);
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            position: relative;
            border: 2px solid #ffd70033;
        }

        /* Loading Screen */
        #loading-screen {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, #1a1f35, #0a0e1a);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.5s;
        }

        .loading-logo {
            font-size: 60px;
            font-weight: bold;
            color: #ffd700;
            text-shadow: 0 0 20px #ff6b6b;
            margin-bottom: 30px;
            animation: pulse 1.5s infinite;
        }

        .loading-bar {
            width: 250px;
            height: 10px;
            background: #2a2f45;
            border-radius: 10px;
            overflow: hidden;
            margin: 20px;
        }

        .loading-progress {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #ff6b6b, #ffd700);
            transition: width 0.3s;
            border-radius: 10px;
        }

        .loading-text {
            color: #fff;
            font-size: 14px;
            letter-spacing: 2px;
        }

        /* Main Menu */
        #main-menu {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(145deg, #1a1f35, #0f1425);
            display: none;
            overflow-y: auto;
            padding-bottom: 80px;
        }

        /* Header */
        .menu-header {
            background: linear-gradient(90deg, #ff6b6b, #ffd700);
            padding: 20px;
            border-bottom-left-radius: 30px;
            border-bottom-right-radius: 30px;
            box-shadow: 0 10px 30px rgba(255, 107, 107, 0.3);
        }

        .player-info {
            display: flex;
            align-items: center;
            gap: 15px;
            color: white;
        }

        .player-avatar {
            width: 70px;
            height: 70px;
            background: #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            border: 4px solid #ffd700;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .player-details {
            flex: 1;
        }

        .player-name {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 5px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .player-uid {
            font-size: 12px;
            background: rgba(0,0,0,0.3);
            padding: 5px 10px;
            border-radius: 20px;
            display: inline-block;
        }

        .balance-container {
            display: flex;
            gap: 15px;
            margin-top: 15px;
        }

        .balance-item {
            background: rgba(0,0,0,0.3);
            padding: 10px 15px;
            border-radius: 25px;
            display: flex;
            align-items: center;
            gap: 5px;
            font-weight: bold;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* Menu Navigation */
        .menu-nav {
            display: flex;
            padding: 15px;
            gap: 10px;
            background: #0f1425;
            border-bottom: 2px solid #ffd70033;
            overflow-x: auto;
            scrollbar-width: none;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .menu-nav::-webkit-scrollbar {
            display: none;
        }

        .nav-item {
            padding: 12px 25px;
            background: #2a2f45;
            border-radius: 30px;
            color: #fff;
            font-weight: bold;
            white-space: nowrap;
            transition: all 0.3s;
            border: 1px solid #ffd70033;
        }

        .nav-item.active {
            background: linear-gradient(90deg, #ff6b6b, #ffd700);
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(255, 107, 107, 0.4);
        }

        /* Menu Content */
        .menu-content {
            padding: 20px;
            animation: slideUp 0.3s ease;
        }

        /* Character Grid */
        .character-grid, .weapon-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-top: 20px;
        }

        .character-card {
            background: linear-gradient(145deg, #2a2f45, #1a1f35);
            border-radius: 20px;
            padding: 15px;
            text-align: center;
            border: 2px solid #ffd70033;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .character-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, #ffd70022, transparent 70%);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .character-card:hover::before {
            opacity: 1;
        }

        .character-card.locked {
            filter: grayscale(1);
            opacity: 0.7;
        }

        .character-avatar {
            width: 100px;
            height: 100px;
            background: linear-gradient(45deg, #ff6b6b, #ffd700);
            border-radius: 50%;
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            color: white;
            border: 3px solid #fff;
        }

        .character-name {
            font-size: 18px;
            font-weight: bold;
            color: #fff;
            margin-bottom: 5px;
        }

        .character-skill {
            font-size: 12px;
            color: #ffd700;
            margin-bottom: 10px;
            padding: 5px;
            background: rgba(0,0,0,0.3);
            border-radius: 15px;
        }

        .character-price {
            font-size: 16px;
            color: #ff6b6b;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        /* Gameplay Screen */
        #gameplay-screen {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(145deg, #2a5f3a, #1a3f2a);
            display: none;
            flex-direction: column;
        }

        .gameplay-header {
            background: rgba(0,0,0,0.5);
            padding: 15px;
            display: flex;
            justify-content: space-between;
            color: white;
            backdrop-filter: blur(10px);
        }

        .game-stats {
            display: flex;
            gap: 20px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #ffd700;
        }

        .gameplay-area {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        #game-canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .joystick-area {
            position: absolute;
            bottom: 30px;
            left: 30px;
            width: 120px;
            height: 120px;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            border-radius: 50%;
            border: 2px solid #ffd700;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .joystick {
            width: 60px;
            height: 60px;
            background: rgba(255,255,255,0.3);
            border-radius: 50%;
            border: 2px solid #fff;
            transition: transform 0.1s;
        }

        .action-buttons {
            position: absolute;
            bottom: 30px;
            right: 30px;
            display: flex;
            gap: 15px;
        }

        .action-btn {
            width: 70px;
            height: 70px;
            background: rgba(255,107,107,0.8);
            backdrop-filter: blur(5px);
            border-radius: 50%;
            border: 2px solid #ffd700;
            color: white;
            font-size: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .action-btn:active {
            transform: scale(0.9);
        }

        /* Shop Items */
        .shop-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .shop-item {
            background: linear-gradient(145deg, #2a2f45, #1a1f35);
            border-radius: 20px;
            padding: 15px;
            text-align: center;
            border: 2px solid #ffd70033;
        }

        .shop-item-icon {
            font-size: 40px;
            margin-bottom: 10px;
        }

        .shop-item-name {
            color: white;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .shop-item-price {
            color: #ffd700;
            font-weight: bold;
            margin: 10px 0;
        }

        .buy-btn {
            background: linear-gradient(90deg, #ff6b6b, #ffd700);
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
        }

        /* Animations */
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .damage-effect {
            animation: shake 0.3s;
        }

        /* Notifications */
        .notification {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(90deg, #ff6b6b, #ffd700);
            color: white;
            padding: 15px 30px;
            border-radius: 50px;
            font-weight: bold;
            z-index: 2000;
            display: none;
            animation: slideDown 0.3s;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        @keyframes slideDown {
            from {
                top: -100px;
                opacity: 0;
            }
            to {
                top: 20px;
                opacity: 1;
            }
        }

        /* Audio Controls */
        .audio-controls {
            position: absolute;
            bottom: 20px;
            right: 20px;
            z-index: 1500;
            display: flex;
            gap: 10px;
        }

        .audio-btn {
            width: 50px;
            height: 50px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            border: 2px solid #ffd700;
            border-radius: 50%;
            color: white;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <!-- Loading Screen -->
        <div id="loading-screen">
            <div class="loading-logo">FREE FIRE</div>
            <div class="loading-bar">
                <div class="loading-progress" id="loading-progress"></div>
            </div>
            <div class="loading-text" id="loading-text">Loading resources...</div>
        </div>

        <!-- Main Menu -->
        <div id="main-menu">
            <div class="menu-header">
                <div class="player-info">
                    <div class="player-avatar" id="player-avatar">🔥</div>
                    <div class="player-details">
                        <div class="player-name" id="player-name">Phoenix</div>
                        <div class="player-uid" id="player-uid">UID: FF-1234-5678</div>
                    </div>
                </div>
                <div class="balance-container">
                    <div class="balance-item">
                        <span>💎</span>
                        <span id="diamond-balance">5000</span>
                    </div>
                    <div class="balance-item">
                        <span>💰</span>
                        <span id="coin-balance">100000</span>
                    </div>
                </div>
            </div>

            <div class="menu-nav" id="menu-nav">
                <div class="nav-item active" onclick="switchMenuTab('home')">🏠 HOME</div>
                <div class="nav-item" onclick="switchMenuTab('characters')">👥 CHARACTERS</div>
                <div class="nav-item" onclick="switchMenuTab('weapons')">🔫 WEAPONS</div>
                <div class="nav-item" onclick="switchMenuTab('shop')">🛒 SHOP</div>
                <div class="nav-item" onclick="switchMenuTab('uid')">🆔 UID</div>
                <div class="nav-item" onclick="startGameplay()">🎮 PLAY</div>
            </div>

            <div class="menu-content" id="menu-content">
                <!-- Content will be loaded dynamically -->
            </div>
        </div>

        <!-- Gameplay Screen -->
        <div id="gameplay-screen">
            <div class="gameplay-header">
                <div class="game-stats">
                    <div class="stat-item">
                        <div class="stat-value" id="kill-count">0</div>
                        <div>KILLS</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="player-count">50</div>
                        <div>ALIVE</div>
                    </div>
                </div>
                <div class="game-stats">
                    <div class="stat-item">
                        <div class="stat-value" id="game-time">00:00</div>
                        <div>TIME</div>
                    </div>
                </div>
            </div>

            <div class="gameplay-area">
                <canvas id="game-canvas"></canvas>
                
                <div class="joystick-area">
                    <div class="joystick" id="joystick"></div>
                </div>

                <div class="action-buttons">
                    <div class="action-btn" id="shoot-btn" onclick="shoot()">🔫</div>
                    <div class="action-btn" id="reload-btn" onclick="reload()">🔄</div>
                    <div class="action-btn" id="grenade-btn" onclick="throwGrenade()">💣</div>
                </div>
            </div>

            <div class="audio-controls">
                <div class="audio-btn" onclick="toggleMusic()">🔊</div>
                <div class="audio-btn" onclick="toggleSFX()">🎵</div>
            </div>
        </div>

        <!-- Notification -->
        <div class="notification" id="notification"></div>
    </div>

    <script>
        // Game State
        const gameState = {
            uid: 'FF-' + Math.floor(1000 + Math.random() * 9000) + '-' + Math.floor(1000 + Math.random() * 9000),
            diamonds: 5000,
            coins: 100000,
            username: 'Phoenix_' + Math.floor(Math.random() * 1000),
            level: 45,
            experience: 7500,
            characters: ['alok', 'kelly'],
            weapons: ['ak47', 'm1014'],
            currentWeapon: 'ak47',
            ammo: 30,
            maxAmmo: 30,
            health: 100,
            armor: 100,
            kills: 0,
            gameActive: false,
            musicEnabled: true,
            sfxEnabled: true,
            enemies: [],
            playerPos: { x: 200, y: 200 },
            joystickActive: false,
            joystickPos: { x: 0, y: 0 }
        };

        // Game Data
        const characters = [
            { id: 'alok', name: 'ALOK', skill: 'Drop the Beat - Heals 5HP/s', price: 599, emoji: '🎵', unlocked: true },
            { id: 'chrono', name: 'CHRONO', skill: 'Time Turner - Shield 600HP', price: 699, emoji: '⏰', unlocked: false },
            { id: 'kelly', name: 'KELLY', skill: 'Dash - Speed Boost 15%', price: 299, emoji: '🏃', unlocked: true },
            { id: 'dimitri', name: 'DIMITRI', skill: 'Healing Heartbeat - AoE Heal', price: 399, emoji: '❤️', unlocked: false },
            { id: 'moco', name: 'MOCO', skill: 'Hacker\'s Eye - Tag Enemies', price: 349, emoji: '👁️', unlocked: false },
            { id: 'hayato', name: 'HAYATO', skill: 'Bushido - Armor Boost', price: 449, emoji: '⚔️', unlocked: false }
        ];

        const weapons = [
            { id: 'ak47', name: 'AK47', damage: 85, range: 'Medium', ammo: 30, price: 25000, emoji: '🔫', unlocked: true },
            { id: 'm1014', name: 'M1014', damage: 95, range: 'Close', ammo: 8, price: 30000, emoji: '🔫', unlocked: true },
            { id: 'scar', name: 'SCAR', damage: 82, range: 'Medium', ammo: 30, price: 28000, emoji: '🔫', unlocked: false },
            { id: 'awm', name: 'AWM', damage: 100, range: 'Long', ammo: 5, price: 45000, emoji: '🔫', unlocked: false },
            { id: 'mp40', name: 'MP40', damage: 78, range: 'Close', ammo: 25, price: 22000, emoji: '🔫', unlocked: false },
            { id: 'm249', name: 'M249', damage: 88, range: 'Medium', ammo: 100, price: 35000, emoji: '🔫', unlocked: false }
        ];

        const shopItems = [
            { id: 'diamonds100', name: '100 Diamonds', price: 0.99, emoji: '💎', type: 'diamonds', value: 100 },
            { id: 'diamonds500', name: '500 Diamonds', price: 4.99, emoji: '💎', type: 'diamonds', value: 500 },
            { id: 'diamonds1000', name: '1000 Diamonds', price: 9.99, emoji: '💎', type: 'diamonds', value: 1000 },
            { id: 'elite_pass', name: 'Elite Pass', price: 2.99, emoji: '🎫', type: 'pass', value: 'premium' },
            { id: 'weapon_crate', name: 'Weapon Crate', price: 1.99, emoji: '📦', type: 'crate', value: 'weapon' },
            { id: 'character_crate', name: 'Character Crate', price: 2.99, emoji: '🎁', type: 'crate', value: 'character' }
        ];

        // Initialize
        window.onload = function() {
            startLoading();
            initCanvas();
            checkTelegramWebApp();
        };

        function startLoading() {
            const progress = document.getElementById('loading-progress');
            const text = document.getElementById('loading-text');
            let width = 0;
            
            const interval = setInterval(() => {
                if (width >= 100) {
                    clearInterval(interval);
                    setTimeout(() => {
                        document.getElementById('loading-screen').style.opacity = '0';
                        setTimeout(() => {
                            document.getElementById('loading-screen').style.display = 'none';
                            document.getElementById('main-menu').style.display = 'block';
                            loadMenuContent('home');
                            updateUI();
                        }, 500);
                    }, 500);
                } else {
                    width += Math.random() * 10;
                    if (width > 100) width = 100;
                    progress.style.width = width + '%';
                    text.textContent = `Loading... ${Math.floor(width)}%`;
                }
            }, 100);
        }

        function checkTelegramWebApp() {
            if (window.Telegram && window.Telegram.WebApp) {
                const tg = window.Telegram.WebApp;
                tg.expand();
                tg.ready();
                
                const user = tg.initDataUnsafe?.user;
                if (user) {
                    gameState.username = user.first_name || user.username || gameState.username;
                    gameState.telegramId = user.id;
                }
                
                updateUI();
            }
        }

        // Menu Navigation
        function switchMenuTab(tab) {
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            event.target.classList.add('active');
            loadMenuContent(tab);
        }

        function loadMenuContent(tab) {
            const content = document.getElementById('menu-content');
            
            switch(tab) {
                case 'home':
                    content.innerHTML = generateHomeContent();
                    break;
                case 'characters':
                    content.innerHTML = generateCharactersContent();
                    break;
                case 'weapons':
                    content.innerHTML = generateWeaponsContent();
                    break;
                case 'shop':
                    content.innerHTML = generateShopContent();
                    break;
                case 'uid':
                    content.innerHTML = generateUIDContent();
                    break;
            }
        }

        function generateHomeContent() {
            return `
                <div style="text-align: center; color: white;">
                    <h2 style="margin-bottom: 20px;">Welcome Back, ${gameState.username}!</h2>
                    <div style="background: linear-gradient(145deg, #2a2f45, #1a1f35); padding: 20px; border-radius: 20px; margin-bottom: 20px;">
                        <div style="font-size: 16px; color: #ffd700;">LEVEL ${gameState.level}</div>
                        <div style="width: 100%; height: 10px; background: #0f1425; border-radius: 10px; margin: 10px 0;">
                            <div style="width: ${(gameState.experience % 1000) / 10}%; height: 100%; background: linear-gradient(90deg, #ff6b6b, #ffd700); border-radius: 10px;"></div>
                        </div>
                        <div style="font-size: 14px;">${gameState.experience} / 10000 XP</div>
                    </div>
                    
                    <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-bottom: 20px;">
                        <div style="background: linear-gradient(145deg, #2a2f45, #1a1f35); padding: 20px; border-radius: 20px;">
                            <div style="font-size: 30px;">👥</div>
                            <div>${gameState.characters.length}/${characters.length}</div>
                            <div>Characters</div>
                        </div>
                        <div style="background: linear-gradient(145deg, #2a2f45, #1a1f35); padding: 20px; border-radius: 20px;">
                            <div style="font-size: 30px;">🔫</div>
                            <div>${gameState.weapons.length}/${weapons.length}</div>
                            <div>Weapons</div>
                        </div>
                    </div>

                    <div style="background: linear-gradient(145deg, #2a2f45, #1a1f35); padding: 20px; border-radius: 20px;">
                        <h3 style="margin-bottom: 15px;">Daily Rewards</h3>
                        <div style="display: flex; justify-content: space-around;">
                            <div>Day 1: 💎100</div>
                            <div>Day 2: 💎200</div>
                            <div>Day 3: 💎300</div>
                        </div>
                        <button class="buy-btn" style="margin-top: 20px;" onclick="claimDailyReward()">CLAIM REWARD</button>
                    </div>
                </div>
            `;
        }

        function generateCharactersContent() {
            let html = '<h2 style="color: white; margin-bottom: 20px;">CHARACTERS</h2><div class="character-grid">';
            
            characters.forEach(char => {
                const unlocked = gameState.characters.includes(char.id);
                html += `
                    <div class="character-card ${unlocked ? '' : 'locked'}" onclick="${unlocked ? 'selectCharacter(\'' + char.id + '\')' : 'purchaseCharacter(\'' + char.id + '\')'}">
                        <div class="character-avatar">${char.emoji}</div>
                        <div class="character-name">${char.name}</div>
                        <div class="character-skill">${char.skill}</div>
                        <div class="character-price">
                            ${unlocked ? '✅ OWNED' : '💎 ' + char.price}
                        </div>
                    </div>
                `;
            });
            
            html += '</div>';
            return html;
        }

        function generateWeaponsContent() {
            let html = '<h2 style="color: white; margin-bottom: 20px;">WEAPONS</h2><div class="weapon-grid">';
            
            weapons.forEach(weapon => {
                const unlocked = gameState.weapons.includes(weapon.id);
                html += `
                    <div class="character-card ${unlocked ? '' : 'locked'}" onclick="${unlocked ? 'selectWeapon(\'' + weapon.id + '\')' : 'purchaseWeapon(\'' + weapon.id + '\')'}">
                        <div class="character-avatar">${weapon.emoji}</div>
                        <div class="character-name">${weapon.name}</div>
                        <div class="character-skill">Damage: ${weapon.damage} | Ammo: ${weapon.ammo}</div>
                        <div class="character-price">
                            ${unlocked ? '✅ OWNED' : '💰 ' + weapon.price.toLocaleString()}
                        </div>
                    </div>
                `;
            });
            
            html += '</div>';
            return html;
        }

        function generateShopContent() {
            let html = '<h2 style="color: white; margin-bottom: 20px;">DIAMOND SHOP</h2><div class="shop-grid">';
            
            shopItems.forEach(item => {
                html += `
                    <div class="shop-item">
                        <div class="shop-item-icon">${item.emoji}</div>
                        <div class="shop-item-name">${item.name}</div>
                        <div class="shop-item-price">$${item.price}</div>
                        <button class="buy-btn" onclick="purchaseShopItem('${item.id}')">BUY NOW</button>
                    </div>
                `;
            });
            
            html += '</div>';
            return html;
        }

        function generateUIDContent() {
            return `
                <div style="background: linear-gradient(145deg, #2a2f45, #1a1f35); padding: 30px; border-radius: 20px; text-align: center;">
                    <h2 style="color: white; margin-bottom: 20px;">YOUR UID</h2>
                    <div style="background: linear-gradient(90deg, #ff6b6b, #ffd700); padding: 30px; border-radius: 20px; margin-bottom: 20px;">
                        <div style="font-size: 32px; font-weight: bold; color: white; letter-spacing: 5px;" id="uid-display">${gameState.uid}</div>
                    </div>
                    <button class="buy-btn" style="margin-bottom: 10px;" onclick="generateNewUID()">GENERATE NEW UID</button>
                    <button class="buy-btn" onclick="connectTelegram()">CONNECT TELEGRAM</button>
                </div>
            `;
        }

        // Game Functions
        function startGameplay() {
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('gameplay-screen').style.display = 'flex';
            gameState.gameActive = true;
            gameState.health = 100;
            gameState.armor = 100;
            gameState.kills = 0;
            
            spawnEnemies();
            startGameTimer();
            playSound('game_start');
            showNotification('Match Started! Good Luck!');
        }

        function exitGameplay() {
            document.getElementById('gameplay-screen').style.display = 'none';
            document.getElementById('main-menu').style.display = 'block';
            gameState.gameActive = false;
        }

        // Canvas Game
        let canvas, ctx;
        let animationFrame;

        function initCanvas() {
            canvas = document.getElementById('game-canvas');
            ctx = canvas.getContext('2d');
            
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);
        }

        function resizeCanvas() {
            const container = document.querySelector('.gameplay-area');
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
        }

        function gameLoop() {
            if (!gameState.gameActive) return;
            
            updateGame();
            renderGame();
            
            animationFrame = requestAnimationFrame(gameLoop);
        }

        function updateGame() {
            // Update player position based on joystick
            if (gameState.joystickActive) {
                gameState.playerPos.x += gameState.joystickPos.x * 5;
                gameState.playerPos.y += gameState.joystickPos.y * 5;
                
                // Keep player in bounds
                gameState.playerPos.x = Math.max(50, Math.min(canvas.width - 50, gameState.playerPos.x));
                gameState.playerPos.y = Math.max(50, Math.min(canvas.height - 50, gameState.playerPos.y));
            }
            
            // Update enemies
            gameState.enemies.forEach((enemy, index) => {
                // Simple AI - move towards player
                const dx = gameState.playerPos.x - enemy.x;
                const dy = gameState.playerPos.y - enemy.y;
                const distance = Math.sqrt(dx * dx + dy * dy);
                
                if (distance > 100) {
                    enemy.x += (dx / distance) * 2;
                    enemy.y += (dy / distance) * 2;
                }
                
                // Enemy shooting
                if (Math.random() < 0.01 && distance < 300) {
                    takeDamage(10);
                }
            });
        }

        function renderGame() {
            // Clear canvas
            ctx.fillStyle = '#2a5f3a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Draw grid
            ctx.strokeStyle = '#3a7f4a';
            ctx.lineWidth = 1;
            for (let i = 0; i < canvas.width; i += 50) {
                ctx.beginPath();
                ctx.strokeStyle = '#3a7f4a33';
                ctx.moveTo(i, 0);
                ctx.lineTo(i, canvas.height);
                ctx.stroke();
            }
            for (let i = 0; i < canvas.height; i += 50) {
                ctx.beginPath();
                ctx.moveTo(0, i);
                ctx.lineTo(canvas.width, i);
                ctx.stroke();
            }
            
            // Draw enemies
            gameState.enemies.forEach(enemy => {
                // Enemy body
                ctx.fillStyle = '#ff4444';
                ctx.beginPath();
                ctx.arc(enemy.x, enemy.y, 25, 0, Math.PI * 2);
                ctx.fill();
                
                // Enemy gun
                ctx.fillStyle = '#333';
                ctx.fillRect(enemy.x + 15, enemy.y - 5, 30, 10);
                
                // Enemy health bar
                const healthPercent = enemy.health / 100;
                ctx.fillStyle = '#ffd700';
                ctx.fillRect(enemy.x - 30, enemy.y - 40, 60 * healthPercent, 5);
                ctx.strokeStyle = '#fff';
                ctx.strokeRect(enemy.x - 30, enemy.y - 40, 60, 5);
            });
            
            // Draw player
            ctx.fillStyle = '#4CAF50';
            ctx.beginPath();
            ctx.arc(gameState.playerPos.x, gameState.playerPos.y, 30, 0, Math.PI * 2);
            ctx.fill();
            
            // Draw player gun
            ctx.fillStyle = '#333';
            ctx.fillRect(gameState.playerPos.x + 20, gameState.playerPos.y - 10, 40, 20);
            
            // Draw player name
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 16px Arial';
            ctx.textAlign = 'center';
            ctx.fillText(gameState.username, gameState.playerPos.x, gameState.playerPos.y - 50);
            
            // Draw health bar
            ctx.fillStyle = '#ff4444';
            ctx.fillRect(gameState.playerPos.x - 35, gameState.playerPos.y - 60, 70, 8);
            ctx.fillStyle = '#4CAF50';
            ctx.fillRect(gameState.playerPos.x - 35, gameState.playerPos.y - 60, 70 * (gameState.health / 100), 8);
            
            // Draw crosshair
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(gameState.playerPos.x - 15, gameState.playerPos.y);
            ctx.lineTo(gameState.playerPos.x + 15, gameState.playerPos.y);
            ctx.moveTo(gameState.playerPos.x, gameState.playerPos.y - 15);
            ctx.lineTo(gameState.playerPos.x, gameState.playerPos.y + 15);
            ctx.stroke();
        }

        function spawnEnemies() {
            gameState.enemies = [];
            for (let i = 0; i < 10; i++) {
                gameState.enemies.push({
                    id: i,
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    health: 100,
                    damage: 10
                });
            }
            document.getElementById('player-count').textContent = 50 - gameState.kills;
        }

        function shoot() {
            if (gameState.ammo <= 0) {
                showNotification('Out of ammo! Reload!');
                playSound('empty');
                return;
            }
            
            gameState.ammo--;
            playSound('shoot');
            
            // Check for hit
            gameState.enemies.forEach((enemy, index) => {
                const distance = Math.sqrt(
                    Math.pow(enemy.x - gameState.playerPos.x, 2) + 
                    Math.pow(enemy.y - gameState.playerPos.y, 2)
                );
                
                if (distance < 100) {
                    enemy.health -= 85; // AK47 damage
                    
                    if (enemy.health <= 0) {
                        gameState.enemies.splice(index, 1);
                        gameState.kills++;
                        document.getElementById('kill-count').textContent = gameState.kills;
                        document.getElementById('player-count').textContent = 50 - gameState.kills;
                        gameState.coins += 500;
                        playSound('kill');
                        showNotification('+500 Coins');
                        
                        if (gameState.enemies.length === 0) {
                            spawnEnemies();
                        }
                    }
                }
            });
        }

        function reload() {
            gameState.ammo = gameState.maxAmmo;
            playSound('reload');
            showNotification('Reloaded!');
        }

        function throwGrenade() {
            playSound('grenade');
            showNotification('Grenade thrown!');
            
            // Damage all nearby enemies
            gameState.enemies.forEach((enemy, index) => {
                const distance = Math.sqrt(
                    Math.pow(enemy.x - gameState.playerPos.x, 2) + 
                    Math.pow(enemy.y - gameState.playerPos.y, 2)
                );
                
                if (distance < 150) {
                    enemy.health -= 50;
                    
                    if (enemy.health <= 0) {
                        gameState.enemies.splice(index, 1);
                        gameState.kills++;
                        document.getElementById('kill-count').textContent = gameState.kills;
                        gameState.coins += 500;
                    }
                }
            });
        }

        function takeDamage(amount) {
            if (gameState.armor > 0) {
                gameState.armor -= amount * 0.5;
                if (gameState.armor < 0) gameState.armor = 0;
            } else {
                gameState.health -= amount;
            }
            
            document.body.classList.add('damage-effect');
            setTimeout(() => document.body.classList.remove('damage-effect'), 300);
            
            if (gameState.health <= 0) {
                gameOver();
            }
            
            playSound('hit');
        }

        function gameOver() {
            gameState.gameActive = false;
            cancelAnimationFrame(animationFrame);
            showNotification('GAME OVER!');
            playSound('game_over');
            
            setTimeout(() => {
                exitGameplay();
            }, 2000);
        }

        // Joystick Controls
        const joystick = document.getElementById('joystick');
        
        joystick.addEventListener('touchstart', (e) => {
            gameState.joystickActive = true;
        });
        
        joystick.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            const rect = joystick.parentElement.getBoundingClientRect();
            
            const x = touch.clientX - rect.left - rect.width / 2;
            const y = touch.clientY - rect.top - rect.height / 2;
            
            const distance = Math.sqrt(x * x + y * y);
            const maxDistance = rect.width / 2;
            
            if (distance < maxDistance) {
                gameState.joystickPos = { x: x / maxDistance, y: y / maxDistance };
                joystick.style.transform = `translate(${x}px, ${y}px)`;
            }
        });
        
        joystick.addEventListener('touchend', () => {
            gameState.joystickActive = false;
            gameState.joystickPos = { x: 0, y: 0 };
            joystick.style.transform = 'translate(0px, 0px)';
        });

        // Timer
        let gameTimer;
        let minutes = 0;
        let seconds = 0;

        function startGameTimer() {
            minutes = 0;
            seconds = 0;
            gameTimer = setInterval(() => {
                seconds++;
                if (seconds >= 60) {
                    minutes++;
                    seconds = 0;
                }
                document.getElementById('game-time').textContent = 
                    `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            }, 1000);
        }

        // Purchase Functions
        function purchaseCharacter(characterId) {
            const character = characters.find(c => c.id === characterId);
            
            if (gameState.diamonds >= character.price) {
                gameState.diamonds -= character.price;
                gameState.characters.push(characterId);
                updateUI();
                showNotification(`Purchased ${character.name}!`);
                playSound('purchase');
                loadMenuContent('characters');
            } else {
                showNotification('Insufficient Diamonds!');
                playSound('error');
            }
        }

        function purchaseWeapon(weaponId) {
            const weapon = weapons.find(w => w.id === weaponId);
            
            if (gameState.coins >= weapon.price) {
                gameState.coins -= weapon.price;
                gameState.weapons.push(weaponId);
                updateUI();
                showNotification(`Purchased ${weapon.name}!`);
                playSound('purchase');
                loadMenuContent('weapons');
            } else {
                showNotification('Insufficient Coins!');
                playSound('error');
            }
        }

        function purchaseShopItem(itemId) {
            const item = shopItems.find(i => i.id === itemId);
            
            if (item.type === 'diamonds') {
                gameState.diamonds += item.value;
                updateUI();
                showNotification(`Added ${item.value} Diamonds!`);
                playSound('purchase');
            }
        }

        function selectCharacter(characterId) {
            showNotification('Character Selected!');
            playSound('select');
        }

        function selectWeapon(weaponId) {
            gameState.currentWeapon = weaponId;
            const weapon = weapons.find(w => w.id === weaponId);
            gameState.maxAmmo = weapon.ammo;
            gameState.ammo = weapon.ammo;
            showNotification(`${weapon.name} Equipped!`);
            playSound('select');
        }

        function claimDailyReward() {
            gameState.diamonds += 100;
            updateUI();
            showNotification('Daily Reward Claimed: 100 Diamonds!');
            playSound('reward');
        }

        function generateNewUID() {
            gameState.uid = 'FF-' + Math.floor(1000 + Math.random() * 9000) + '-' + Math.floor(1000 + Math.random() * 9000);
            document.getElementById('uid-display').textContent = gameState.uid;
            updateUI();
            showNotification('New UID Generated!');
            playSound('generate');
        }

        function connectTelegram() {
            if (window.Telegram && window.Telegram.WebApp) {
                const tg = window.Telegram.WebApp;
                tg.sendData(JSON.stringify({
                    action: 'connect',
                    uid: gameState.uid,
                    userId: gameState.telegramId
                }));
                showNotification('Connected to Telegram!');
            } else {
                showNotification('Please open in Telegram!');
            }
        }

        // Audio Functions
        function playSound(type) {
            if (!gameState.sfxEnabled) return;
            
            const sounds = {
                purchase: '💰',
                error: '❌',
                reward: '🎉',
                game_start: '🎮',
                shoot: '🔫',
                reload: '🔄',
                empty: '⚠️',
                kill: '💀',
                hit: '💥',
                grenade: '💣',
                game_over: '🏁',
                select: '✅',
                generate: '⚡'
            };
            
            console.log(`🔊 Playing: ${sounds[type] || '🔔'}`);
        }

        function toggleMusic() {
            gameState.musicEnabled = !gameState.musicEnabled;
            const btn = document.querySelector('.audio-btn:first-child');
            btn.textContent = gameState.musicEnabled ? '🔊' : '🔇';
            showNotification(gameState.musicEnabled ? 'Music On' : 'Music Off');
        }

        function toggleSFX() {
            gameState.sfxEnabled = !gameState.sfxEnabled;
            const btn = document.querySelector('.audio-btn:last-child');
            btn.textContent = gameState.sfxEnabled ? '🎵' : '🔇';
            showNotification(gameState.sfxEnabled ? 'Sound Effects On' : 'Sound Effects Off');
        }

        // Utility Functions
        function updateUI() {
            document.getElementById('player-name').textContent = gameState.username;
            document.getElementById('player-uid').textContent = `UID: ${gameState.uid}`;
            document.getElementById('diamond-balance').textContent = gameState.diamonds;
            document.getElementById('coin-balance').textContent = gameState.coins.toLocaleString();
        }

        function showNotification(message) {
            const notification = document.getElementById('notification');
            notification.textContent = message;
            notification.style.display = 'block';
            
            setTimeout(() => {
                notification.style.display = 'none';
            }, 2000);
        }
    </script>

    <!-- Telegram WebApp Script -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</body>
